version: 2
updates:
  # npm devDependencies (ESLint, Stylelint, Prettier, ...)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Bahia"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  # GitHub Actions used in .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Bahia"
    groups:
      github-actions:
        patterns: ["*"]
