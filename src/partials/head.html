<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="{{description}}" />
<!-- Content hashes of the Web Workers (stamped by build.js): map-manager.js
     builds worker URLs from these so worker edits cache-bust automatically. -->
<meta name="labmim-asset-hashes" content="{{WORKER_HASHES}}" />
<title>{{title}}</title>

<!-- SEO: canonical + Open Graph + Twitter (gerado por build.js a partir de PROD) -->
{{seoHead}}
<link
  rel="icon"
  href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌦️</text></svg>"
/>

<!-- Bootstrap 5.3.8 (vendorizado localmente — sem CDN no caminho crítico).
     Versão PURGADA: só os seletores usados pelo site (~27KB em vez de 232KB);
     o bootstrap.min.css completo permanece ao lado e `npm run lint:purge`
     acusa quando uma classe nova exigir regenerar (scripts/purgecss.config.cjs). -->
<link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.purged.min.css" />

<!-- Font Awesome 6.4.0 (vendorizado localmente). O preload quebra a cadeia
     HTML -> CSS -> fonte: todas as páginas usam ícones solid e a fonte tem
     font-display:block (ícones invisíveis até carregar). crossorigin é
     obrigatório em preload de fonte, mesmo same-origin, senão baixa 2x. -->
<link
  rel="preload"
  href="assets/vendor/fontawesome/webfonts/fa-solid-900.woff2"
  as="font"
  type="font/woff2"
  crossorigin
/>
<link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css?v=6.4.0" />

<!-- LabMiM modular CSS -->
<link rel="stylesheet" href="assets/css/base.css" />
<link rel="stylesheet" href="assets/css/layout.css" />
<link rel="stylesheet" href="assets/css/components.css" />
<link rel="stylesheet" href="assets/css/theme.css" />

<script src="assets/js/theme-boot.js"></script>
<script src="assets/js/theme-toggle.js" defer></script>
<script src="assets/js/ui-shell.js" defer></script>
