<!doctype html>
<html lang="pt-BR">
  <head>
{{> head}}

    <!-- Leaflet 1.9.4 (vendorizado localmente — sem CDN no caminho crítico; defer libera o primeiro paint) -->
    <link rel="stylesheet" href="assets/vendor/leaflet/leaflet.css?v=1.9.4" />
    <script src="assets/vendor/leaflet/leaflet.js?v=1.9.4" defer></script>

    <!-- Maps-specific CSS (extracted from inline) -->
    <link rel="stylesheet" href="assets/css/maps.css" />

    <!-- preconnect: os tiles são pedidos ~1s após a navegação, então a
         conexão aquecida (DNS + TCP + TLS) é sempre aproveitada; dns-prefetch
         permanece como fallback para navegadores antigos. -->
    <link rel="preconnect" href="https://tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://tile.openstreetmap.org" />
  </head>

  <body{{bodyAttrs}}>
    <a class="skip-link" href="#main">Pular para o conteúdo</a>
    <header class="maps-header">
{{> nav}}
    </header>

    <h1 class="visually-hidden">{{h1}}</h1>
{{content}}

    <!-- Scripts ao final do body — não bloqueiam o rendering -->
{{> scripts}}

    <!-- Chart.js 3.9.1 (vendorizado localmente) -->
    <script defer src="assets/vendor/chartjs/chart.min.js?v=3.9.1"></script>

    <!-- Configuração de variáveis + serviço de dados + gráficos + mapa.
         O build.js estampa ?v=<hash do conteúdo> em todo CSS/JS próprio; os
         Web Workers recebem hash pela <meta name="labmim-asset-hashes">
         (lida por workerScriptUrl em map-manager.js; sem hash a URL sai
         sem ?v= e cai nas regras de cache curto). -->
    <script src="assets/js/variables-config.js" defer></script>
    <script src="assets/js/data-service.js" defer></script>
    <script src="assets/js/charts-manager.js" defer></script>
    <script src="assets/js/map-manager.js" defer></script>
    <script src="assets/js/map-init.js" defer></script>
  </body>
</html>
